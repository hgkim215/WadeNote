name: WadeNote
options:
  bundleIdPrefix: com.wadenote
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
targets:
  WadeNote:
    type: application
    platform: iOS
    sources:
      - path: WadeNote
    info:
      path: WadeNote/Info.plist
      properties:
        UILaunchScreen: {}
        NSFaceIDUsageDescription: "WadeNote 잠금 해제에 Face ID를 사용합니다."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - remote-notification
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wadenote.app
        INFOPLIST_KEY_CFBundleDisplayName: WadeNote
        CODE_SIGN_ENTITLEMENTS: WadeNote/WadeNote.entitlements
        # CloudKit을 켜려면: 본인 개발팀 ID를 지정하고 아래 플래그를 활성화한 뒤
        # iCloud > CloudKit capability와 iCloud.com.wadenote.app 컨테이너를 등록한다.
        # DEVELOPMENT_TEAM: "YOUR_TEAM_ID"
        # SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) WADENOTE_CLOUDKIT"
  WadeNoteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WadeNoteTests
    dependencies:
      - target: WadeNote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wadenote.tests
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: "YES"
  WadeNoteStoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WadeNoteStoreTests
    dependencies:
      - target: WadeNote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wadenote.storetests
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: "YES"
schemes:
  WadeNote:
    build:
      targets:
        WadeNote: all
        WadeNoteTests: [test]
        WadeNoteStoreTests: [test]
    test:
      config: Debug
      disableMainThreadChecker: true
      targets:
        - WadeNoteTests
        - WadeNoteStoreTests
