name: WadeNote
options:
  bundleIdPrefix: com.wadenote
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
targets:
  WadeNote:
    type: application
    platform: iOS
    sources:
      - path: WadeNote
    info:
      path: WadeNote/Info.plist
      properties:
        UILaunchScreen: {}
        # xcodegen 재생성 시 버전이 1.0 으로 초기화되지 않도록 여기서 고정한다.
        CFBundleShortVersionString: "1.2.0"
        CFBundleVersion: "1"
        NSFaceIDUsageDescription: "WadeNote 잠금 해제에 Face ID를 사용합니다."
        NSCameraUsageDescription: "캡처를 촬영해 정보를 자동으로 채우는 데 카메라를 사용합니다."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - remote-notification
        # 표준 암호화(HTTPS·Apple CryptoKit)만 사용 → 수출규정 면제 대상.
        # 자체/독점 암호화를 추가하면 이 값을 재검토해야 한다.
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wadenote.app
        INFOPLIST_KEY_CFBundleDisplayName: WadeNote
        # iPhone 전용(1). iPad를 포함(2/1,2)하면 iPad 멀티태스킹 요건상
        # 4방향 회전을 모두 지원해야 해서 세로 고정 앱과 충돌한다.
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: WadeNote/WadeNote.entitlements
        # CloudKit 동기화 활성화됨. 실기기 동기화를 위해서는 본인 개발팀 ID가 필요하다:
        # 아래 줄의 주석을 풀고 Team ID를 넣거나, Xcode > Signing & Capabilities에서
        # Automatically manage signing + 팀을 선택한다(가이드: docs/cloudkit-setup.md).
        # DEVELOPMENT_TEAM: "YOUR_TEAM_ID"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) WADENOTE_CLOUDKIT"
  WadeNoteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WadeNoteTests
    dependencies:
      - target: WadeNote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wadenote.tests
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: "YES"
  WadeNoteStoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WadeNoteStoreTests
    dependencies:
      - target: WadeNote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wadenote.storetests
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: "YES"
schemes:
  WadeNote:
    build:
      targets:
        WadeNote: all
        WadeNoteTests: [test]
        WadeNoteStoreTests: [test]
    test:
      config: Debug
      disableMainThreadChecker: true
      targets:
        - WadeNoteTests
        - WadeNoteStoreTests
